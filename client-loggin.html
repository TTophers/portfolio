<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Client</title>

  <style>
    :root {
      --bg: #0f1115;
      --panel: #151922;
      --accent: #4f8cff;
      --text: #e6e8ee;
      --muted: #9aa0b3;
      --border: #23283a;
    }

    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #151922;
      border-bottom: 1px solid #23283a;
      padding: 16px 24px;
      height: 60px;
    }

    .logo {
      color: #fff;
      font-weight: 600;
      font-size: 1.125rem;
      letter-spacing: 0.5px;
    }

    .home-button {
      background: #4f8cff;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.3s;
    }

    .home-button:hover {
      background: #3e73e6;
    }

    .home-icon {
      width: 20px;
      height: 20px;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
    }

    .login-card h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
    }

    .login-card p {
      margin: 0 0 24px 0;
      color: var(--muted);
      font-size: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #0b0e14;
      color: var(--text);
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .secondary {
      margin-top: 10px;
      background: #23283a;
      border: 1px solid var(--border);
    }

    .footer-text {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .error-message {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: -12px;
      margin-bottom: 16px;
      min-height: 18px;
    }
  </style>
</head>

<body>

<nav class="nav">
  <div class="logo">Client Login</div>

  <a href="index.html" title="Home" class="home-button">
    <i data-feather="home" class="home-icon"></i>
  </a>
</nav>

<main>
  <div class="login-card">

    <h1>Sign In</h1>

    <form id="loginForm">

      <label for="email">Email</label>
      <input type="email" id="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" required />

      <div id="errorMessage" class="error-message"></div>

      <button type="submit">Login</button>

      <button type="button" id="createAccountBtn" class="secondary">
        Create Account
      </button>

    </form>

    <div class="footer-text">Protected system</div>

  </div>
</main>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://frnzvzlrchrqhxtuqezh.supabase.co";
const supabaseKey = "sb_publishable_ZZ0edRrWzAG_uoF5jEeh-w_iedDXCup";

const supabase = createClient(supabaseUrl, supabaseKey);

window.addEventListener('load', async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    window.location.href = "client-dash.html";
  }
});

const form = document.getElementById("loginForm");
const errorMessageDiv = document.getElementById("errorMessage");

form.addEventListener("submit", async (e) => {

  e.preventDefault();
  errorMessageDiv.textContent = "";

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    errorMessageDiv.textContent = error.message;
    return;
  }

  window.location.href = "client-dash.html";

});


const createBtn = document.getElementById("createAccountBtn");

createBtn.addEventListener("click", () => {

  window.location.href = "client-signup.html";

});

</script>

<script src="https://unpkg.com/feather-icons"></script>

<script>
feather.replace();
</script>

</body>
</html>
