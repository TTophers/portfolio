<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100">

<body class="h-full flex bg-slate-50 text-slate-800 font-sans">
  <button id="mobileMenuBtn" class="sm:hidden fixed top-4 left-4 z-50 p-2 text-slate-700 bg-slate-100 rounded-md" aria-label="Toggle sidebar menu">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" 
      stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
  </button>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


  <!-- Sidebar -->
  <div id="sidebarWrapper" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-slate-200 transform -translate-x-full sm:translate-x-0 transition-transform duration-300 z-50">
    <aside class="flex flex-col h-full min-h-screen text-slate-200 w-64 bg-slate-900 border-r border-slate-800">
      <div class="p-6 text-2xl font-bold border-b border-slate-800 text-white">
        ClientDash
      </div>
      <nav class="flex flex-col mt-6 space-y-1 flex-1">
        <a href="client-dash.html" class="flex items-center px-6 py-3 text-white bg-blue-600 font-semibold rounded-r-md">
          <i data-feather="home" class="w-5 h-5 mr-3"></i>
          Dashboard
        </a>
        <a href="C-Test.html" class="flex items-center px-6 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-r-md">
          <i data-feather="globe" class="w-5 h-5 mr-3"></i>
          Test Site
        </a>
        <a href="C-Payments.html" class="flex items-center px-6 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-r-md">
          <i data-feather="credit-card" class="w-5 h-5 mr-3"></i>
          Payments
        </a>
      </nav>
      <div class="mt-auto p-6 border-t border-slate-800">
        <button id="logoutBtn" class="w-full px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition-colors">Logout</button>
      </div>
    </aside>
  </div>


  <!-- Main content -->
  <div class="flex-1 p-6 overflow-auto space-y-6 bg-slate-50 sm:ml-64 pt-12 sm:pt-6">

    <!-- Header -->
    <header class="flex items-center justify-between border-b border-slate-200 pb-4">
      <div>
        <h1 class="text-3xl font-bold">Welcome, Jane Doe</h1>
        <p class="text-gray-600">Plan Tier: <span class="font-semibold text-primary plan-tier">Pro</span></p>
      </div>
    </header>

    <!-- Stats Cards -->
    <section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
      <div class="bg-white rounded-lg shadow-sm p-5 flex flex-col">
        <p class="text-sm font-medium text-slate-500">Active Projects</p>
        <p id="activeProjectsCount" class="mt-2 text-3xl font-semibold">5</p>
      </div>
      <div class="hidden sm:flex bg-white rounded-lg shadow-sm p-5 flex-col">
        <p class="text-sm font-medium text-slate-500">Messages</p>
        <p id="messagesCount" class="mt-2 text-3xl font-semibold">12</p>
      </div>
      <div class="hidden sm:flex bg-white rounded-lg shadow-sm p-5 flex-col">
        <p class="text-sm font-medium text-slate-500">Files Uploaded</p>
        <p id="filesCount" class="mt-2 text-3xl font-semibold">34</p>
      </div>
      <div class="bg-white rounded-lg shadow-sm p-5 flex flex-col">
        <p class="text-sm font-medium text-slate-500">Plan Tier</p>
        <p class="mt-2 text-3xl font-semibold text-primary plan-tier">Pro</p>
      </div>
    </section>

    <!-- Project Progress Section -->
    <section class="bg-white rounded-lg shadow-sm p-6 space-y-4">
      <h2 class="text-xl font-semibold border-b border-gray-200 pb-2">Project Progress</h2>
      <div id="projectProgressContainer" class="space-y-4">
        <!-- Progress bars will be inserted here dynamically -->
      </div>
    </section>

    <!-- Test Site Section -->
    <section class="bg-white rounded-lg shadow-sm p-6 flex flex-col sm:flex-row sm:items-center justify-between space-y-4 sm:space-y-0">
      <div>
        <h2 class="text-xl font-semibold mb-2">Test Site</h2>
        <span class="inline-block px-3 py-1 text-sm font-semibold rounded-full bg-emerald-100 text-emerald-700">Online</span>
      </div>
      <a id="viewTestSiteBtn" target="_blank" class="inline-block px-6 py-3 bg-primary text-white font-semibold rounded-lg hover:bg-primary-dark transition-colors text-center">View Test Site</a>
    </section>


    <!-- File Upload Area -->
    <section class="bg-white rounded-lg shadow-sm p-6 max-w-4xl">
      <h2 class="text-xl font-semibold border-b border-gray-200 pb-2 mb-4">Upload Files</h2>
      <label for="file-upload" class="flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-lg p-12 cursor-pointer hover:border-primary transition-colors text-slate-500">
        <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" 
          stroke-linecap="round" stroke-linejoin="round"><path d="M7 16v4h10v-4M12 12v8m0-8l-4 4m4-4l4 4M16 8l-4-4-4 4"/></svg>
        <span class="text-sm">Drag and drop files here or click to upload</span>
        <input id="file-upload" type="file" multiple class="hidden" />
      </label>
    </section>

  </div>

  <style>
    
    :root {
      --primary: #2563eb;
    }
    .bg-primary { background-color: var(--primary); }
    .text-primary { color: var(--primary); }
    .hover\:bg-primary-dark:hover { background-color: #2563eb; }
  </style>
  <script>
    feather.replace();
  </script>  <script>
    const supabaseUrl = 'https://frnzvzlrchrqhxtuqezh.supabase.co';
    const supabaseKey = 'sb_publishable_ZZ0edRrWzAG_uoF5jEeh-w_iedDXCup';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
  // Global variable for session
  let currentSession = null;

  document.addEventListener('DOMContentLoaded', async () => {
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const sidebarWrapper = document.getElementById('sidebarWrapper');

    // Get current session
    const { data: { session } } = await supabaseClient.auth.getSession();
    currentSession = session;

    // Redirect if no logged-in user
    if (!currentSession || !currentSession.user) {
      window.location.replace('/client-loggin.html');
      return;
    }

    console.log('Session user ID:', currentSession.user.id);

    // Load user data
    const dashboardData = await loadUserData(currentSession.user.id);
    if (dashboardData) {
      updateDashboard(dashboardData);
    }

    // Handle Test Site link
    const testSiteBtn = document.getElementById('viewTestSiteBtn');
    if (testSiteBtn && dashboardData && dashboardData.userData.site) {
      testSiteBtn.href = dashboardData.userData.site;
    } else if (testSiteBtn) {
      testSiteBtn.href = '#';
      testSiteBtn.classList.add('opacity-50', 'cursor-not-allowed');
    }

    // Watch for auth state changes (logout/session expired)
    supabaseClient.auth.onAuthStateChange((event, session) => {
      currentSession = session; // update global session
      if (!session || !session.user) {
        window.location.replace('/client-loggin.html');
      }
    });

    // Logout button logic
    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", async () => {
        try {
          await supabaseClient.auth.signOut({ scope: "global" });
          localStorage.clear();
          sessionStorage.clear();
          window.location.href = "/index.html";
        } catch (err) {
          console.error("Error signing out:", err);
        }
      });
    }

    // Mobile menu toggle
    if (mobileMenuBtn && sidebarWrapper) {
      mobileMenuBtn.addEventListener('click', () => {
        sidebarWrapper.classList.toggle('-translate-x-full');
      });

      document.addEventListener('click', (event) => {
        const isClickInsideSidebar = sidebarWrapper.contains(event.target);
        const isClickOnHamburger = mobileMenuBtn.contains(event.target);

        // Only close sidebar if click is outside sidebar and hamburger, and sidebar is open
        if (!isClickInsideSidebar && !isClickOnHamburger && !sidebarWrapper.classList.contains('-translate-x-full')) {
          sidebarWrapper.classList.add('-translate-x-full');
        }
      });

      let mobileMenuTimeout;
      window.addEventListener('scroll', () => {
        mobileMenuBtn.classList.remove('opacity-0');
        mobileMenuBtn.classList.add('opacity-100', 'transition-opacity', 'duration-300');

        clearTimeout(mobileMenuTimeout);
        mobileMenuTimeout = setTimeout(() => {
          mobileMenuBtn.classList.remove('opacity-100');
          mobileMenuBtn.classList.add('opacity-0', 'transition-opacity', 'duration-300');
        }, 3000);
      });
    }
  });

  // Fetch user data function
  async function loadUserData(userId) {
    try {
      const { data: userData, error: userError } = await supabaseClient
        .from('users')
        .select('full_name, plan, progress, site')
        .eq('auth_id', userId)
        .single();

      if (userError) {
        console.error('Error fetching user data:', userError);
        return null;
      }

      const projects = [
        { name: 'Main Project', progress: userData.progress ?? 0 }
      ];

      // Placeholder counts (update if you track messages/files)
      const messagesCount = 0;
      const filesCount = 0;

      return { userData, projects, messagesCount, filesCount };
    } catch (err) {
      console.error('Unexpected error loading user data:', err);
      return null;
    }
  }

  // Update dashboard UI function
  function updateDashboard(data) {
    if (!data) return;
    const { userData, projects, messagesCount, filesCount } = data;

    // Welcome header
    const headerName = document.querySelector('h1');
    if (headerName) headerName.textContent = `Welcome, ${userData.full_name ?? 'Client'}`;

    // Plan tier
    document.querySelectorAll('.plan-tier').forEach(el => {
      if (el) el.textContent = userData.plan ?? 'Free';
    });

    // Stats cards
    const activeProjectsCard = document.querySelector('#activeProjectsCount');
    if (activeProjectsCard) activeProjectsCard.textContent = projects.length;

    const messagesCard = document.querySelector('#messagesCount');
    if (messagesCard) messagesCard.textContent = messagesCount;

    const filesCard = document.querySelector('#filesCount');
    if (filesCard) filesCard.textContent = filesCount;

    // Progress bars
    const progressContainer = document.querySelector('#projectProgressContainer');
    if (progressContainer) {
      progressContainer.innerHTML = '';
      projects.forEach(project => {
        const progressValue = project.progress ?? 0;
        const projectDiv = document.createElement('div');
        projectDiv.className = 'mb-4';
        projectDiv.innerHTML = `
          <div class="flex justify-between mb-1">
            <span class="text-sm font-medium text-gray-700">${project.name}</span>
            <span class="text-sm font-medium text-gray-700">${progressValue}%</span>
          </div>
          <progress max="100" value="${progressValue}" class="w-full h-3 rounded bg-gray-200 overflow-hidden">
            ${progressValue}%
          </progress>
        `;
        progressContainer.appendChild(projectDiv);
      });
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session || !session.user) return;

  // Create a unique identifier per user
  const userId = session.user.id; // Supabase user ID

  window.Tawk_API = window.Tawk_API || {};
window.Tawk_API.visitor = {
  name: session.user.user_metadata?.full_name || 'Client',
  email: session.user.email,
  hash: session.user.auth_id // persistent, never changes
};

})();});
  </script>
</body>
</html>
