<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="h-full flex bg-gray-100 text-gray-800 font-sans">

  <button id="sidebarToggle" class="fixed top-4 left-4 z-50 p-2 text-slate-700 bg-slate-100 rounded-md sm:hidden" aria-label="Toggle sidebar">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <div id="sidebarWrapper" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-slate-200 transform -translate-x-full sm:translate-x-0 transition-transform duration-300 z-50 flex flex-col">
    <aside class="flex flex-col flex-1 border-r border-gray-200">
      <div class="p-6 text-2xl font-bold border-b border-gray-700">
        ClientDash
      </div>
      <nav class="flex flex-col mt-6 space-y-1 flex-1 overflow-y-auto">
        <a href="client-dash.html" class="flex items-center px-6 py-3 text-slate-300 hover:bg-slate-700 rounded-r-md">
          <i data-feather="home" class="w-5 h-5 mr-3"></i>
          Dashboard
        </a>

        <a href="C-Test.html" class="flex items-center px-6 py-3 text-slate-300 hover:bg-slate-700 rounded-r-md">
          <i data-feather="globe" class="w-5 h-5 mr-3"></i>
          Test Site
        </a>
        <a href="C-Payments.html" class="flex items-center px-6 py-3 text-white bg-primary font-semibold rounded-r-md">
          <i data-feather="credit-card" class="w-5 h-5 mr-3"></i>
          Payments
        </a>
      </nav>
      <div class="p-6 border-t border-gray-700">
        <button id="logoutBtn" class="w-full flex items-center justify-center px-4 py-2 bg-red-600 hover:bg-red-700 rounded-md font-semibold text-white focus:outline-none">
          Logout
        </button>
      </div>
    </aside>
  </div>

  <style>
    :root {
      --primary: #3b82f6;
    }
    .bg-primary { background-color: var(--primary); }
    .text-primary { color: var(--primary); }
    .hover\:bg-primary-dark:hover { background-color: #2563eb; }
  </style>

  <!-- Main Content -->
  <div class="flex-1 p-6 overflow-auto space-y-6 sm:ml-64">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between space-y-3 sm:space-y-0">
      <div>
        <h1 class="text-2xl font-bold">Welcome, <span id="userName" class="text-primary">Client</span></h1>
        <span id="planBadge" class="inline-block mt-1 px-3 py-1 text-xs rounded-full bg-blue-100 text-blue-700 font-medium">No Plan</span>
      </div>
      <button
        id="payNowBtn"
        class="inline-flex items-center px-6 py-2 bg-primary text-white font-semibold rounded-md shadow hover:bg-blue-700 focus:outline-none transition"
      >
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
          stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3"/></svg>
        Pay Now
      </button>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <div class="bg-white rounded-lg shadow p-5 flex flex-col">
        <div class="text-gray-500 text-sm mb-1">Current Plan</div>
        <div class="text-lg font-bold text-gray-900">Pro</div>
      </div>
      <div class="bg-white rounded-lg shadow p-5 flex flex-col">
        <div class="text-gray-500 text-sm mb-1">Next Payment</div>
        <div class="text-lg font-bold text-gray-900">May 30, 2024</div>
      </div>
      <div class="bg-white rounded-lg shadow p-5 flex flex-col">
        <div class="text-gray-500 text-sm mb-1">Last Payment</div>
        <div class="text-lg font-bold text-gray-900">Apr 30, 2024</div>
      </div>
      <div class="bg-white rounded-lg shadow p-5 flex flex-col">
        <div class="text-gray-500 text-sm mb-1">Amount Paid</div>
        <div class="text-lg font-bold text-gray-900">$49.00</div>
      </div>
    </div>

    <!-- Payment History Table -->
    <div class="bg-white rounded-lg shadow p-5">
      <h2 class="text-lg font-semibold mb-4">Payment History</h2>
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
          <thead>
            <tr>
              <th class="px-4 py-2 text-left text-gray-600 font-semibold">Date</th>
              <th class="px-4 py-2 text-left text-gray-600 font-semibold">Amount</th>
              <th class="px-4 py-2 text-left text-gray-600 font-semibold">Status</th>
              <th class="px-4 py-2 text-left text-gray-600 font-semibold">Receipt</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  
    // Replace with your actual Supabase URL and anon key
    const supabaseUrl = 'https://frnzvzlrchrqhxtuqezh.supabase.co';
    const supabaseKey = 'sb_publishable_ZZ0edRrWzAG_uoF5jEeh-w_iedDXCup';
    const supabaseClient = createClient(supabaseUrl, supabaseKey);


    // Stripe Checkout trigger
    document.addEventListener('DOMContentLoaded', function () {
      const payBtn = document.getElementById('payNowBtn');
      if (payBtn) {
        payBtn.addEventListener('click', async () => {
          try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session || !session.user) {
              alert('You must be logged in.');
              return;
            }

            const res = await fetch('http://localhost:3000/create-checkout-session', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                user_id: session.user.id,
                email: session.user.email
              })
            });

            const data = await res.json();

            if (data.url) {
              window.location.href = data.url;
            } else {
              console.error('No checkout URL returned:', data);
              alert('Something went wrong creating checkout session.');
            }
          } catch (err) {
            console.error('Stripe error:', err);
            alert('Error connecting to payment server.');
          }
        });
      }
      document.addEventListener('click', (event) => {
      const isClickInsideSidebar = sidebarWrapper.contains(event.target);
      const isClickOnHamburger = sidebarToggle.contains(event.target);

      // Only close sidebar if click is outside sidebar and hamburger, and sidebar is open
      if (!isClickInsideSidebar && !isClickOnHamburger && !sidebarWrapper.classList.contains('-translate-x-full')) {
        sidebarWrapper.classList.add('-translate-x-full');
      }
    });

      const sidebarToggle = document.getElementById('sidebarToggle');
      const sidebarWrapper = document.getElementById('sidebarWrapper');
      const logoutBtn = document.getElementById('logoutBtn');

      sidebarToggle.addEventListener('click', () => {
        if (sidebarWrapper.classList.contains('-translate-x-full')) {
          sidebarWrapper.classList.remove('-translate-x-full');
        } else {
          sidebarWrapper.classList.add('-translate-x-full');
        }
      });

      // Optional: close sidebar when clicking outside on small screens
      document.addEventListener('click', (e) => {
        if (window.innerWidth < 640) {
          if (!sidebarWrapper.contains(e.target) && !sidebarToggle.contains(e.target)) {
            sidebarWrapper.classList.add('-translate-x-full');
          }
        }
      });

      logoutBtn.addEventListener('click', async () => {
        try {
          await supabaseClient.auth.signOut();
        } catch (err) {
          console.error('Logout error:', err);
        }
        window.location.replace('/index.html');
      });
    });



document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session || !session.user) return;

  const userId = session.user.id;

  // Optional: fetch Tawk widget ID from DB if needed
  const { data: userData, error } = await supabaseClient
  .from('users')
  .select('full_name, plan, price_id, payments')
  .eq('auth_id', userId)
  .single()
  console.log('userData:', userData, 'error:', error);;

  if (userData) {
    const nameEl = document.getElementById('userName');
    const planEl = document.getElementById('planBadge');

    if (nameEl) nameEl.textContent = userData.full_name || 'Client';
    if (planEl) planEl.textContent = userData.plan || 'No Plan';
  }

  // Fetch payment history from user JSON column
  const payments = userData.payments || [];

  const tableBody = document.querySelector('tbody');
  tableBody.innerHTML = '';

  if (payments.length > 0) {
    payments.forEach(p => {
      const row = `
        <tr class="hover:bg-gray-50">
          <td class="px-4 py-2">${new Date(p.created_at).toLocaleDateString()}</td>
          <td class="px-4 py-2">$${p.amount}</td>
          <td class="px-4 py-2">
            <span class="inline-block px-2 py-1 text-xs ${p.status === 'paid' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'} rounded">
              ${p.status}
            </span>
          </td>
          <td class="px-4 py-2">${p.receipt_url ? `<a href="${p.receipt_url}" target="_blank" class="text-primary underline">View</a>` : '—'}</td>
        </tr>
      `;
      tableBody.innerHTML += row;
    });
  } else {
    tableBody.innerHTML = '<tr><td colspan="4" class="px-4 py-2 text-center text-gray-500">No payments yet.</td></tr>';
  }

  window.Tawk_API = window.Tawk_API || {};
  window.Tawk_API.visitor = {
    name: session.user.user_metadata?.full_name || 'Client',
    email: session.user.email,
    hash: userId
  };

  // Embed Tawk script once
  const s1 = document.createElement('script');
  s1.src = 'https://embed.tawk.to/69bd9d5dcfaccd1c35824e34/1jk6atd3s';
  s1.async = true;
  s1.charset = 'UTF-8';
  s1.setAttribute('crossorigin', '*');
  document.head.appendChild(s1);
});
</script>

    feather.replace();
  </script>
</body>
</html>
